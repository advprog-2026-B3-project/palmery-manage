spring.application.name=palmery-manage
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:${POSTGRES_URL:jdbc:postgresql://localhost:5432/managedb}}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

rustfs.endpoint=${RUSTFS_ENDPOINT:http://localhost:9000}
rustfs.access-key=${RUSTFS_ACCESS_KEY:minioadmin}
rustfs.secret-key=${RUSTFS_SECRET_KEY:minioadmin}
rustfs.bucket=${RUSTFS_BUCKET:harvest-photos}
rustfs.public-url=${RUSTFS_PUBLIC_URL:http://localhost:9000}


jwt.secret=${JWT_SECRET:replace-this-secret-with-at-least-32-characters}

auth.integration.base-url=${AUTH_API_BASE_URL:http://localhost:8080}
auth.integration.service-client-id=${AUTH_SERVICE_CLIENT_ID:palmery-internal-service}
auth.integration.service-client-secret=${AUTH_SERVICE_CLIENT_SECRET:replace-with-service-client-secret}
auth.integration.enabled=${AUTH_INTEGRATION_ENABLED:true}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

app.event.queue=${APP_EVENT_QUEUE:palmery.domain.events}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
rabbitmq.exchange.harvest=${RABBITMQ_EXCHANGE_HARVEST:harvest_exchange}
rabbitmq.routingkey.harvest.approved=${RABBITMQ_ROUTINGKEY_HARVEST_APPROVED:harvest_approved_routing_key}
rabbitmq.routingkey.harvest.submitted=${RABBITMQ_ROUTINGKEY_HARVEST_SUBMITTED:harvest_submitted_routing_key}
rabbitmq.queue.harvest.approved=${RABBITMQ_QUEUE_HARVEST_APPROVED:harvest_approved_queue}
rabbitmq.queue.harvest.submitted=${RABBITMQ_QUEUE_HARVEST_SUBMITTED:harvest_submitted_queue}
