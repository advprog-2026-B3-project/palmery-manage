spring.datasource.url=jdbc:postgresql://localhost:5432/palmery_manage_dev
spring.datasource.username=postgres
spring.datasource.password=law210

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

logging.level.id.ac.ui.cs.advprog.palmerymanage=DEBUG

jwt.secret=${JWT_SECRET:replace-this-secret-with-at-least-32-characters}

auth.integration.base-url=${AUTH_API_BASE_URL:http://localhost:8080}
auth.integration.service-client-id=${AUTH_SERVICE_CLIENT_ID:palmery-internal-service}
auth.integration.service-client-secret=${AUTH_SERVICE_CLIENT_SECRET:replace-with-service-client-secret}
auth.integration.enabled=${AUTH_INTEGRATION_ENABLED:true}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

app.event.queue=${APP_EVENT_QUEUE:palmery.domain.events}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
