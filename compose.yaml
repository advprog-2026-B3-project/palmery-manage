services:
  manage-postgres:
    image: postgres:16-alpine
    container_name: palmery-manage-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-managedb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - manage-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-managedb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  palmery-manage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palmery-manage-app
    depends_on:
      manage-postgres:
        condition: service_healthy
      palmery-redis:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      POSTGRES_URL: jdbc:postgresql://manage-postgres:5432/managedb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-minioadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-minioadmin}
      RUSTFS_BUCKET: harvest-photos
      RUSTFS_PUBLIC_URL: http://rustfs:9000
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-host.docker.internal}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-at-least-32-characters}
      AUTH_API_BASE_URL: ${AUTH_API_BASE_URL:-http://host.docker.internal:8080}
      AUTH_SERVICE_CLIENT_ID: ${AUTH_SERVICE_CLIENT_ID:-palmery-internal-service}
      AUTH_SERVICE_CLIENT_SECRET: ${AUTH_SERVICE_CLIENT_SECRET:-replace-with-service-client-secret}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:-host.docker.internal}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:-5672}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
    ports:
      - "8081:8081"
  rustfs:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    container_name: palmery-rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 10s
      retries: 3

  palmery-redis:
    image: redis:7-alpine
    container_name: palmery-manage-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  manage-postgres-data:
  rustfs_data:
  redis_data:
