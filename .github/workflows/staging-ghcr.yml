name: Staging GHCR Publish

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Test
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectName=palmery-manage
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.sources=src/main
            -Dsonar.tests=src/test
            -Dsonar.java.binaries=build/classes/java/main
            -Dsonar.exclusions=**/.gradle/**,**/build/**

      - name: Sonar Vulnerability Gate (non-main)
        if: github.ref != 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            query="pullRequest=${{ github.event.pull_request.number }}"
          else
            query="branch=${GITHUB_REF_NAME}"
          fi

          response=$(curl -sS -u "${SONAR_TOKEN}:" \
            "${SONAR_HOST_URL}/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&resolved=false&ps=1&${query}")
          api_errors=$(echo "${response}" | jq '.errors | length // 0')
          if [ "${api_errors}" -gt 0 ]; then
            echo "Sonar API returned errors:"
            echo "${response}" | jq -c '.errors'
            exit 1
          fi
          total=$(echo "${response}" | jq -r '.total // 0')
          echo "Sonar unresolved vulnerabilities: ${total}"
          [ "${total}" -eq 0 ]

      - name: SonarCloud Quality Gate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          pollingTimeoutSec: 300

  publish:
    needs: sonar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: doodpanda
          password: ${{ secrets.GHCR_PAT }}

      - name: Normalize owner name
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push manage backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/palmery-manage-backend:staging
            ghcr.io/${{ steps.owner.outputs.value }}/palmery-manage-backend:staging-${{ github.sha }}
