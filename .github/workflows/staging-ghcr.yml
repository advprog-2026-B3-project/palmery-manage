name: Staging GHCR Publish

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: doodpanda
          password: ${{ secrets.GHCR_PAT }}

      - name: Normalize owner name
        id: owner
        run: |
          echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push manage backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/palmery-manage-backend:staging
            ghcr.io/${{ steps.owner.outputs.value }}/palmery-manage-backend:staging-${{ github.sha }}
